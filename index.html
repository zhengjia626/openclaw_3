<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Trae 管理界面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>OpenClaw Trae 管理界面</h1>
            <p>管理 OpenClaw 的 Trae 集成插件</p>
        </header>
        
        <nav>
            <ul>
                <li><a href="#dashboard">仪表盘</a></li>
                <li><a href="#skills">技能管理</a></li>
                <li><a href="#execute">命令执行</a></li>
                <li><a href="#settings">设置</a></li>
            </ul>
        </nav>
        
        <main>
            <section id="dashboard">
                <h2>仪表盘</h2>
                <div class="card">
                    <h3>插件状态</h3>
                    <div id="plugin-status">
                        <p>正在检查插件状态...</p>
                    </div>
                </div>
                
                <div class="card">
                    <h3>系统信息</h3>
                    <div id="system-info">
                        <p>正在获取系统信息...</p>
                    </div>
                </div>
            </section>
            
            <section id="skills">
                <h2>技能管理</h2>
                <div class="card">
                    <h3>已安装的技能</h3>
                    <div id="skills-list">
                        <p>正在加载技能列表...</p>
                    </div>
                </div>
                
                <div class="card">
                    <h3>安装新技能</h3>
                    <form id="install-skill-form">
                        <input type="text" id="skill-url" placeholder="技能 URL" required>
                        <button type="submit">安装</button>
                    </form>
                </div>
            </section>
            
            <section id="execute">
                <h2>命令执行</h2>
                <div class="card">
                    <h3>执行命令</h3>
                    <form id="execute-command-form">
                        <input type="text" id="command" placeholder="命令" required>
                        <input type="text" id="arguments" placeholder="参数 (用空格分隔)">
                        <input type="text" id="cwd" placeholder="工作目录">
                        <button type="submit">执行</button>
                    </form>
                    <div id="command-output">
                        <p>命令输出将显示在这里...</p>
                    </div>
                </div>
            </section>
            
            <section id="settings">
                <h2>设置</h2>
                <div class="card">
                    <h3>插件设置</h3>
                    <form id="settings-form">
                        <div class="form-group">
                            <label for="log-level">日志级别</label>
                            <select id="log-level">
                                <option value="debug">Debug</option>
                                <option value="info">Info</option>
                                <option value="warn">Warn</option>
                                <option value="error">Error</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="timeout">命令超时时间 (秒)</label>
                            <input type="number" id="timeout" value="30">
                        </div>
                        <button type="submit">保存设置</button>
                    </form>
                </div>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2026 OpenClaw Trae 管理界面</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
